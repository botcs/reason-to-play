# Seventeenth slice: action-only / elaborate for deepseek V4 models x 12 games.
#
# Companion to slice 16 (which covers the original 5 non-9B models).
# Extends the action-only baseline to deepseek-v4-pro and v4-flash so
# every model on the main grid has an action-only data point.
#
# Action-only eliminates reasoning tokens entirely, so v4-pro's
# saturation issues from slices 13/14 are irrelevant here -- output is
# ~10 tokens/step.
#
# Grid: 2 models x 12 games x 1 mode x 1 suggestion x 1 seed = 24 cells.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/seventeenth_slice_v4_action_only_elaborate.yaml -n 24 --stagger 0

program: src.llm_eval.generative_gameplay.run
method: grid
name: seventeenth-slice-v4-action-only-elaborate
parameters:
  harness.rationale_mode:
    value: action-only
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    values:
      - deepseek/deepseek-v4-pro
      - deepseek/deepseek-v4-flash
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    values:
      - avoidGeorge_vgfmri4
      - bait_vgfmri3
      - bait_vgfmri4
      - chase_vgfmri3
      - chase_vgfmri4
      - helper_vgfmri3
      - helper_vgfmri4
      - lemmings_vgfmri3
      - lemmings_vgfmri4
      - plaqueAttack_vgfmri3
      - zelda_vgfmri3
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
