# Fourteenth slice: re-run the 5 deepseek-v4-pro slots from slice 13 that
# crashed with `ConsecutiveSaturatedRetriesExceeded` at Level 0, Attempt 0.
#
# Failure mode (verified from tmux sessions on aws-dev-cpu, runs zqp0j7q3,
# lq2nlmfd, 67kcm1kw, 9o50r5ao, 7bvhys1w): every reply burned all 16384
# output tokens on hidden reasoning, leaving content empty; 3 retries in
# a row hit the saturation guard and the agent died before the first
# successful env.step(). No level/frame metric was ever logged.
#
# Mitigation:
#   llm.max_tokens                65536 (was 16384) -- 4x output ceiling so
#                                 reasoning + content can fit comfortably.
#   llm.api_budget                $360  (8x slice 12 baseline of $45;
#                                 slice 13 used 4x = $180).
#
# Everything else matches slice 13 / 12 defaults so results are comparable.
#
# Grid: 1 model x 5 games x 1 seed = 5 cells.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/fourteenth_slice_v4_pro_saturation_recovery.yaml -n 5 --stagger 0

program: src.llm_eval.generative_gameplay.run
method: grid
name: fourteenth-slice-v4-pro-saturation-recovery
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    value: deepseek/deepseek-v4-pro
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 65536
  llm.api_budget:
    value: 360.0
  seed:
    value: 0
  game.game:
    values:
      - lemmings_vgfmri3
      - plaqueAttack_vgfmri3
      - zelda_vgfmri3
      - lemmings_vgfmri4
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
