# Human replay -- action-only (no LLM, no imputation), vgfmri4 cohort.
#
# sub-12..sub-32 ran the vgfmri4 cohort (6 games each).  Each wandb run
# covers one (subject, game) pair so the sweep generates enough cells to
# parallelise across many agents.
#
# Grid: 21 subjects x 6 games x 1 suggestion_level = 126 runs.
# Single suggestion_level because action-only does no LLM call, so the
# suggestion prompt is pure metadata; kept in sync with the DB grid.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/replay_action_only_vgfmri4.yaml -n 8

program: src.llm_eval.human_replay.run_replay
method: grid
name: replay-action-only-vgfmri4
parameters:
  harness.rationale_mode:
    value: action-only
  harness.suggestion_level:
    value: elaborate
  replay.subject:
    values:
      - sub-12
      - sub-13
      - sub-14
      - sub-15
      - sub-16
      - sub-17
      - sub-18
      - sub-19
      - sub-20
      - sub-21
      - sub-22
      - sub-23
      - sub-24
      - sub-25
      - sub-26
      - sub-27
      - sub-28
      - sub-29
      - sub-30
      - sub-31
      - sub-32
  replay.game_filter:
    values:
      - vgfmri4_avoidgeorge
      - vgfmri4_bait
      - vgfmri4_chase
      - vgfmri4_helper
      - vgfmri4_lemmings
      - vgfmri4_zelda
  replay.action_frames_only:
    value: true
  replay.stride:
    value: 1
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.human_replay.run_replay
  - ${args_no_hyphens}
