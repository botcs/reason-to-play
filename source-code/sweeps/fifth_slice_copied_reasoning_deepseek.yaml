# Fifth slice: copied-reasoning on deepseek-v3.2 with raised token cap.
#
# Slice 1 crashed all 4 copied-reasoning runs on 9B because reasoning tokens
# filled the 4096-token cap (reasoning_tokens up to 4995) leaving empty
# visible JSON, which then deterministically looped through the parse
# retry budget.  Slices 3 and 4 subsequently ran without copied-reasoning,
# so we have no data on whether the hidden-trace path actually lifts
# performance on bigger/reasoning-native models.
#
# Hypothesis: disabling reasoning traces weakened the models on later
# levels.  Test by re-enabling copied-reasoning on deepseek-v3.2 (a
# reasoning-native model) with max_tokens raised to 16384 -- 4x the
# previous cap, comfortably above the observed reasoning_tokens=~5k
# saturation point, with headroom for longer traces at deeper levels.
#
# Games: bait_vgfmri4 and zelda_vgfmri4 (direct comparison to slice 3
# prompted-rationale on zelda_vgfmri4, and slice 4 minimal-prompt runs
# on both games).
#
# Grid: 1 model x 1 rationale_mode x 2 games x 1 suggestion x 1 seed = 2 runs
#
# Launch:
#   python scripts/launch_sweep.py sweeps/fifth_slice_copied_reasoning_deepseek.yaml -n 2

program: src.llm_eval.generative_gameplay.run
method: grid
name: fifth-slice-copied-reasoning-deepseek-v32
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: elaborate
  llm.model:
    value: deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  seed:
    value: 0
  game.game:
    values:
      - bait_vgfmri4
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 4
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
