# Human replay -- action-only oracle (no LLM, no imputation), vgfmri3 cohort.
#
# Identical to replay_action_only_vgfmri3.yaml except suggestion_level=oracle.
# The oracle system prompt includes the full game rules (object colors,
# interactions, win/lose conditions) so feature extraction sees a richer
# context.  No LLM call happens -- the human action is injected directly.
#
# Grid: 11 subjects x 6 games x 1 suggestion_level = 66 runs.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/replay_action_only_oracle_vgfmri3.yaml -n 8

program: src.llm_eval.human_replay.run_replay
method: grid
name: replay-action-only-oracle-vgfmri3
parameters:
  harness.rationale_mode:
    value: action-only
  harness.suggestion_level:
    values: [minimal, oracle]
  replay.subject:
    values:
      - sub-01
      - sub-02
      - sub-03
      - sub-04
      - sub-05
      - sub-06
      - sub-07
      - sub-08
      - sub-09
      - sub-10
      - sub-11
  replay.game_filter:
    values:
      - vgfmri3_bait
      - vgfmri3_chase
      - vgfmri3_helper
      - vgfmri3_lemmings
      - vgfmri3_plaqueAttack
      - vgfmri3_zelda
  replay.action_frames_only:
    value: true
  replay.stride:
    value: 1
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true
  exp_db.force_reclaim:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.human_replay.run_replay
  - ${args_no_hyphens}
