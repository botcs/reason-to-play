# Fourth slice: minimal suggestion level smoke test.
#
# Primary question: does dropping the system prompt from ~600 tokens
# (elaborate) to ~30 tokens (minimal) meaningfully change behaviour, or
# does the model get by on history alone?  If minimal performs
# comparably, it's viable as a second suggestion dimension without
# doubling cost materially (per-run savings are tiny; the run count is
# what doubles).
#
# Launched in parallel with the third slice.  Reuses slice 1's 4-game
# set for direct comparability.  Drops action-only (slice 2 already
# established it as the weakest mode); keeps prompted-rationale only.
# copied-reasoning omitted because 9B crashed 4/4 in slice 1 and the
# fix has not been re-validated yet.
#
# Grid: 3 models x 1 rationale_mode x 4 games x 1 suggestion x 1 seed = 12 runs
#
# Launch:
#   python scripts/launch_sweep.py sweeps/fourth_slice_minimal_suggestion.yaml -n 4

program: src.llm_eval.generative_gameplay.run
method: grid
name: fourth-slice-minimal-suggestion
parameters:
  harness.rationale_mode:
    value: prompted-rationale
  harness.suggestion_level:
    value: minimal
  llm.model:
    values:
      - qwen/qwen3.5-9b
      - qwen/qwen3.5-397b-a17b
      - deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  seed:
    value: 0
  game.game:
    values:
      - bait_vgfmri4
      - chase_vgfmri3
      - zelda_vgfmri4
      - lemmings_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 4
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
