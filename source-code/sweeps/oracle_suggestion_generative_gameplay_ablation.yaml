program: src.llm_eval.generative_gameplay.run
method: grid
name: oracle_suggestion_generative_gameplay_ablation
parameters:
  harness.rationale_mode:
    value: action-only
  harness.suggestion_level:
    values: [minimal, oracle]
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    values:
      - qwen/qwen3.5-9b
      - qwen/qwen3.5-27b
      - qwen/qwen3.5-35b-a3b
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    values:
      - avoidGeorge_vgfmri4
      - bait_vgfmri4
      - chase_vgfmri4
      - helper_vgfmri4
      - lemmings_vgfmri4
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
