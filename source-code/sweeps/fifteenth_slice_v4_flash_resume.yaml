# Fifteenth slice: resume slice-13 deepseek-v4-flash runs killed by key limit.
#
# All 12 v4-flash cells in slice 13 (sweep 2ms4kc9f) were killed by an
# OpenRouter 403 "Key limit exceeded" error while still making progress
# (L1-L7).  Replay files were saved to S3.
#
# This sweep is identical to the v4-flash subset of slice 13 except:
#   exp_db.resume = true   (downloads prior replay from S3, resumes at
#                           last mastered level with conversation intact)
#
# Grid: 1 model x 12 games x 1 seed = 12 cells.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/fifteenth_slice_v4_flash_resume.yaml -n 12 --stagger 0

program: src.llm_eval.generative_gameplay.run
method: grid
name: fifteenth-slice-v4-flash-resume
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    value: deepseek/deepseek-v4-flash
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 180.0
  seed:
    value: 0
  game.game:
    values:
      - avoidGeorge_vgfmri4
      - bait_vgfmri3
      - bait_vgfmri4
      - chase_vgfmri3
      - chase_vgfmri4
      - helper_vgfmri3
      - helper_vgfmri4
      - lemmings_vgfmri3
      - lemmings_vgfmri4
      - plaqueAttack_vgfmri3
      - zelda_vgfmri3
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true
  exp_db.resume:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
