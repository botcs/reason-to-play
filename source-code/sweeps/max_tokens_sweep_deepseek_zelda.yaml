# 2D context-fill x max-tokens sweep on deepseek-v3.2 elab zelda_vgfmri4.
#
# Independent study (not a numbered slice).  Direct follow-up to the
# context-window sweep (``bnny7ji9``, 2026-04-22), which isolated
# ``harness.context_usage_fraction`` but left ``llm.max_tokens`` fixed
# at the 2026-04-22 default of 8192 -- half of slice 5's 16384.  That
# sweep found deepseek elaborate only reached L2-L5 at every fill
# level, despite slice 5 (rid ``qx5jqh9u``) completing zelda L8 under
# a matched effective fill.  The surviving confound is the halved
# ``max_tokens``.
#
# This sweep crosses the fill axis with a max_tokens axis so the two
# interact cleanly.  If slice-5 L8 completion is recoverable, the
# (fraction, max_tokens) pair that recovers it is a direct answer to
# "what did the 2026-04-21 default change break?".
#
# Axes:
#   harness.context_usage_fraction: [0.1, 0.5, 0.9]    (matches bnny7ji9)
#   llm.max_tokens:                 [16384, 32768]     (slice 5's cap + a
#                                                       2x headroom cell)
# Dropped: mt=65536 (the OpenRouter hard cap).  Including it with the
# fill axis would compound a reduced input_limit confound at every
# fill level, making the 2D grid hard to interpret.  If a follow-up
# needs the unbounded treatment, it should be a 1D sweep at a single
# fill level with mt=65536 plus a matched mt=32768 cell at the same
# effective input_limit.
#
# The elaborate prompt's Token Budget section
# (``prompts/gameplay/copied-reasoning_elaborate.txt:47-48``) embeds
# ``{max_output_tokens}`` via ``harness.py:65-75`` substitution, so
# each cell reads verbatim "capped at 16384 tokens" or "capped at
# 32768 tokens".  No prompt variant needed.
#
# Model: deepseek-v3.2 only.  Qwens are excluded because raising
# ``max_tokens`` back to 16384+ would re-introduce the 81920 = 5 *
# 16384 provider reasoning ceiling that crashed slice 7/9/10 minimal
# runs.  That is a separate investigation.
#
# Input-budget table (truncator formula: ``(131072 - max_tokens) *
# fraction``):
#   fraction=0.1 mt=16384:  11,469   (aggressive trim)
#   fraction=0.1 mt=32768:   9,830   (aggressive trim)
#   fraction=0.5 mt=16384:  57,344   (matches slice 5's p50=51k)
#   fraction=0.5 mt=32768:  49,152   (close to slice 5)
#   fraction=0.9 mt=16384: 103,219   (high coherence stress)
#   fraction=0.9 mt=32768:  88,473   (high stress)
# Slice 5's anchor cell is (fraction=0.5, mt=16384); compare its
# outcome here against qx5jqh9u's L8 completion to verify recovery.
#
# DB logging is DISABLED (``exp_db.enabled: false``).  Results land in
# wandb only; no slot claim in ``vgdl-grid-gameplay``.
#
# Grid: 1 model x 3 fractions x 2 max_tokens x 1 seed = 6 runs.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/max_tokens_sweep_deepseek_zelda.yaml -n 3

program: src.llm_eval.generative_gameplay.run
method: grid
name: max-tokens-sweep-deepseek-zelda
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    values: [0.1, 0.5, 0.9]
  llm.max_tokens:
    values: [16384, 32768]
  llm.model:
    value: deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    value: zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 4
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: false

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
