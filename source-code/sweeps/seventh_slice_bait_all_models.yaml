# Seventh slice: bait_vgfmri4 across all 6 models, copied-reasoning minimal.
#
# Goal: with the parse-retry + hidden-reasoning-echo + api_budget patches
# in place, exercise every model in the grid on the single hardest game
# we have a baseline for (bait_vgfmri4 reached L7 with crashes on
# deepseek-v3.2 in slices 5 and 6; the patches should either let the
# model push past L7 or, failing that, crash cleanly with persisted
# forensics).
#
# Model list mirrors grid_configs/main.yaml::gameplay.llm.model -- all
# 6 gameplay models, in cost-multiplier order.  Suggestion is pinned to
# minimal because slice 6 showed minimal solves games 15% faster on
# zelda and 4% faster on bait vs elaborate.  rationale_mode is
# copied-reasoning for the same reason -- it is the only mode that
# completed a game in the experiment series so far (zelda_vgfmri4 L9,
# slice 5/6, deepseek-v3.2).
#
# llm.api_budget is set to $45 as the per-run safety net.  That cap
# covers the forecasted 397b-a17b cost (~$21 on linear scaling) with
# 2x headroom; it will abort a runaway without blowing the slice
# budget.  On cheaper models the cap is non-binding.
#
# Grid: 6 models x 1 mode x 1 game x 1 suggestion x 1 seed = 6 runs
#
# Launch:
#   python scripts/launch_sweep.py sweeps/seventh_slice_bait_all_models.yaml -n 4

program: src.llm_eval.generative_gameplay.run
method: grid
name: seventh-slice-bait-all-models-copied-reasoning-minimal
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: minimal
  llm.model:
    values:
      - qwen/qwen3.5-9b
      - qwen/qwen3.5-27b
      - qwen/qwen3.5-35b-a3b
      - qwen/qwen3.5-122b-a10b
      - qwen/qwen3.5-397b-a17b
      - deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    value: bait_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 4
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
