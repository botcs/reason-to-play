# Sixteenth slice: action-only / elaborate across 5 models x 12 games.
#
# The action-only counterpart to slice 12's copied-reasoning baseline.
# Qwen3.5-9B is excluded -- slices 1+2 already provide 9B action-only
# data across all 12 games, and the grid DB has those slots filled.
#
# Purpose: measure the level-reach delta between action-only and
# copied-reasoning on a per-game, per-model basis.  Action-only emits
# only {"action": "..."} (~10 tokens/step), so cost is input-dominated
# and per-kframe rates should be well below the copied-reasoning anchor.
#
# Config matches slice 12 exactly except rationale_mode=action-only
# and the 9B row is dropped.
#
# Grid: 5 models x 12 games x 1 mode x 1 suggestion x 1 seed = 60 cells.
#
# Launch:
#   python scripts/launch_sweep.py sweeps/sixteenth_slice_action_only_elaborate.yaml -n 60 --stagger 0

program: src.llm_eval.generative_gameplay.run
method: grid
name: sixteenth-slice-action-only-elaborate
parameters:
  harness.rationale_mode:
    value: action-only
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    values:
      - qwen/qwen3.5-27b
      - qwen/qwen3.5-35b-a3b
      - qwen/qwen3.5-122b-a10b
      - qwen/qwen3.5-397b-a17b
      - deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    values:
      - avoidGeorge_vgfmri4
      - bait_vgfmri3
      - bait_vgfmri4
      - chase_vgfmri3
      - chase_vgfmri4
      - helper_vgfmri3
      - helper_vgfmri4
      - lemmings_vgfmri3
      - lemmings_vgfmri4
      - plaqueAttack_vgfmri3
      - zelda_vgfmri3
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
