# Tenth slice: zelda_vgfmri4 across all 6 models, copied-reasoning ELABORATE.
#
# Replication of slice 9's design on the easier game.  Slice 9 showed:
# (1) elaborate dominates minimal on every model (bait), (2)
# qwen3.5-397b-a17b elaborate COMPLETES bait_vgfmri4 at L8 -- first
# Qwen completion, first bait completion.  Slice 10 asks whether both
# generalise to zelda_vgfmri4 (the only game completed by any prior
# config, slices 5/6 on deepseek).
#
# Eighth slice was skipped due to a numbering miscount during the
# 2026-04-21 planning session; there is intentionally no sweep yaml
# between ninth and tenth.
#
# First slice launched under the new defaults: after slice 9's
# "parse-retry budget 10 is too tight" finding, `conf/config.yaml`
# moved to `llm.parse_retry_budget=45` and `llm.max_tokens=8192`.
# This YAML deliberately does NOT override those fields so the new
# defaults flow through -- slice 10 doubles as a regression test for
# the default change.
#
# Grid: 6 models x 1 mode x 1 game x 1 suggestion x 1 seed = 6 runs
#
# Launch:
#   python scripts/launch_sweep.py sweeps/tenth_slice_zelda_all_models_elaborate.yaml -n 4

program: src.llm_eval.generative_gameplay.run
method: grid
name: tenth-slice-zelda-all-models-copied-reasoning-elaborate
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    values: [minimal, elaborate]
  llm.model:
    values:
      - qwen/qwen3.5-9b
      - qwen/qwen3.5-27b
      - qwen/qwen3.5-35b-a3b
      - qwen/qwen3.5-122b-a10b
      - qwen/qwen3.5-397b-a17b
      - deepseek/deepseek-v3.2
  llm.backend:
    value: openrouter
  llm.api_budget:
    value: 45.0
  seed:
    value: 0
  game.game:
    value: zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 4
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
