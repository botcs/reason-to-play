# Thirteenth slice: new DeepSeek V4 models x all 12 games at post-study defaults.
#
# Same configuration as twelfth_slice_all_games_all_models_defaults.yaml
# (post-study tuned defaults from the max_tokens x context_usage_fraction
# sensitivity study):
#   harness.context_usage_fraction = 0.3
#   llm.max_tokens                 = 16384
#   harness.suggestion_level       = elaborate
#   harness.rationale_mode         = copied-reasoning
#   game.advancement.max_consecutive_losses = 7
#
# Models: deepseek/deepseek-v4-pro, deepseek/deepseek-v4-flash
# (released 2026-04-23, ~20h before this sweep). OpenRouter premium pricing
# during the launch window means we bump llm.api_budget from $45 -> $180
# (4x slice 12) to keep parity in tokens-per-cell with the rest of the
# grid.
#
# Grid: 2 models x 12 games x 1 mode x 1 suggestion x 1 seed = 24 cells.
#
# Launch (24 cells; one agent per cell, simultaneous start):
#   python scripts/launch_sweep.py sweeps/thirteenth_slice_v4_models_defaults.yaml -n 24 --stagger 0

program: src.llm_eval.generative_gameplay.run
method: grid
name: thirteenth-slice-v4-models-defaults
parameters:
  harness.rationale_mode:
    value: copied-reasoning
  harness.suggestion_level:
    value: elaborate
  harness.context_usage_fraction:
    value: 0.3
  llm.model:
    values:
      - deepseek/deepseek-v4-pro
      - deepseek/deepseek-v4-flash
  llm.backend:
    value: openrouter
  llm.max_tokens:
    value: 16384
  llm.api_budget:
    value: 180.0
  seed:
    value: 0
  game.game:
    values:
      - avoidGeorge_vgfmri4
      - bait_vgfmri3
      - bait_vgfmri4
      - chase_vgfmri3
      - chase_vgfmri4
      - helper_vgfmri3
      - helper_vgfmri4
      - lemmings_vgfmri3
      - lemmings_vgfmri4
      - plaqueAttack_vgfmri3
      - zelda_vgfmri3
      - zelda_vgfmri4
  game.max_levels:
    value: 9
  game.advancement.strategy:
    value: blocked_curricula
  game.advancement.total_frame_budget:
    value: 4500
  game.advancement.consecutive_wins_required:
    value: 2
  game.advancement.max_consecutive_losses:
    value: 7
  game.idle_frames:
    value: 3
  logging.wandb_project:
    value: <WANDB-PROJECT>
  exp_db.enabled:
    value: true

command:
  - ${env}
  - python
  - -m
  - src.llm_eval.generative_gameplay.run
  - ${args_no_hyphens}
